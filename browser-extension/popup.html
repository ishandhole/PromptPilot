<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 280px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            color: #e2e8f0;
            background: #0f172a;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: #3b82f6;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 12px;
            height: 12px;
            fill: white;
        }

        .logo-text {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .status {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .status.connected {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status.disconnected {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        p {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .sites {
            margin-top: 10px;
            font-size: 11px;
            color: #64748b;
        }

        .sites ul {
            margin-top: 4px;
            padding-left: 16px;
        }

        .sites li {
            margin-bottom: 2px;
        }
    </style>
</head>

<body>
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 1L2 7h4l-1 4 5-6H6l1-4z" />
            </svg>
        </div>
        <span class="logo-text">PromptPilot</span>
    </div>

    <div class="status" id="status">Checking connection...</div>

    <p id="desc">When you click <strong>Browser Agent</strong> in VS Code, your engineered prompt will automatically
        appear in the active AI tool.</p>

    <button class="btn-primary" id="setup-btn" style="display:none">
        Connect API Key
    </button>

    <button class="btn-secondary" id="disconnect-btn" style="display:none">
        Disconnect
    </button>

    <div class="sites">
        <strong>Supported:</strong>
        <ul>
            <li>Claude.ai</li>
            <li>ChatGPT</li>
            <li>Gemini</li>
            <li>Perplexity</li>
        </ul>
    </div>

    <script src="popup.js"></script>
</body>

</html>
